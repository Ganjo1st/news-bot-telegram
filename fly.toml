app = "news-bot-telegram"  # замените на уникальное имя

[build]
  dockerfile = "Dockerfile"

[env]
  # Переменные будут заданы отдельно, не храните их здесь в открытом виде!

[[services]]
  internal_port = 8080
  processes = ["app"]

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [services.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20
